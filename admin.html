<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel — श्री आदर्श लोकविकास</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Tiro+Devanagari+Marathi&display=swap" rel="stylesheet">
<style>
:root{
  --purple:#7B2D9B;--purple-dark:#4a1564;
  --red:#E30613;--yellow:#F7C800;
  --white:#fff;--bg:#F4F0F8;
  --text:#1a0a26;--muted:#6b5b7b;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

.login-screen{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(135deg,#4a1564,#7B2D9B);
}
.login-box{
  background:white;
  border-radius:18px;
  padding:40px 36px;
  width:100%;
  max-width:380px;
  box-shadow:0 20px 60px rgba(0,0,0,0.25);
}
.login-logo{text-align:center;margin-bottom:28px;}
.login-logo-circle{
  width:68px;height:68px;border-radius:50%;
  background:var(--purple);
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 12px;border:3px solid var(--yellow);
}
.login-logo h2{font-size:18px;color:var(--purple-dark);margin-bottom:4px;}
.login-logo p{font-size:12px;color:var(--muted);}

.login-field{margin-bottom:16px;}
.login-field label{font-size:13px;font-weight:500;color:var(--muted);display:block;margin-bottom:6px;}
.login-field input{
  width:100%;padding:12px 14px;border:2px solid #ddd;border-radius:10px;font-size:15px;
}
.login-field input:focus{border-color:var(--purple);outline:none;}

.login-btn{
  width:100%;padding:14px;background:var(--purple);color:white;border:none;
  border-radius:10px;font-size:16px;font-weight:600;cursor:pointer;margin-top:10px;
}
.login-btn:hover{background:#5f1a80;}

.login-err{
  background:#fde8e8;color:#9b0000;border-radius:8px;padding:10px;
  text-align:center;font-size:14px;margin-top:15px;display:none;
}
.login-err.show{display:block;}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <div class="login-logo">
      <div class="login-logo-circle">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" width="55" height="55">
          <circle cx="50" cy="50" r="50" fill="#7B2D9B"/>
          <text x="50" y="53" text-anchor="middle" font-size="15" fill="white" font-weight="bold">श्री</text>
        </svg>
      </div>
      <h2>श्री आदर्श लोकविकास</h2>
      <p>Admin Panel</p>
    </div>

    <div class="login-field">
      <label>Username</label>
      <input type="text" id="loginUser" placeholder="admin" value="admin">
    </div>

    <div class="login-field">
      <label>Password</label>
      <input type="password" id="loginPass" placeholder="Password" value="Adarsh2026">
    </div>

    <button class="login-btn" onclick="doLogin()">Login</button>

    <div class="login-err" id="loginErr">❌ Wrong username or password</div>

    <p style="text-align:center;margin-top:20px;font-size:13px;color:#666;">
      Default Login:<br>
      Username: <strong>admin</strong><br>
      Password: <strong>Adarsh2026</strong>
    </p>
  </div>
</div>

<script>
// ================== CHANGE HERE ==================
var ADMINS = {
  "admin": "Adarsh2026",     // ← Change password here
  "aniket": "aniket466"      // ← You can add your own username
};
// ================================================

function doLogin(){
  var username = document.getElementById('loginUser').value.trim();
  var password = document.getElementById('loginPass').value;

  if (ADMINS[username] && ADMINS[username] === password) {
    alert("✅ Login Successful!\n\nWelcome to Admin Panel");
    window.location.href = "index.html";   // Redirect to your main website
  } else {
    document.getElementById('loginErr').classList.add('show');
    setTimeout(() => {
      document.getElementById('loginErr').classList.remove('show');
    }, 3000);
  }
}

// Allow Enter key to login
document.getElementById('loginPass').addEventListener('keypress', function(e){
  if(e.key === "Enter") doLogin();
});
</script>
</body>
</html>
